<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modelagem Tridimensional 2026</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    </head>
    <body style="margin: 0; overflow: hidden;">
        <a-scene embedded arjs="sourceType: webcam;">
            <a-marker preset="hiro">
                <a-entity
                    position="0 0.5 0"
                    scale="0.4 0.4 0.4"
                    animation="property: scale; dir: alternate; dur: 800; loop: true; to: 0.44 0.44 0.44; easing: easeInOutSine">
                    <a-sphere position="-0.3 0.2 0" radius="0.4" color="#E63946"></a-sphere>
                    <a-sphere position="0.3 0.2 0" radius="0.4" color="#E63946"></a-sphere>
                    <a-cone
                        position="0 -0.2 0"
                        radius-bottom="0.5"
                        radius-top="0"
                        height="0.9"
                        color="#E63946"
                        rotation="0 0 180">
                    </a-cone>
                </a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
