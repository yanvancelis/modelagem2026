<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modelagem Tridimensional 2026</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
        <style>
            .hidden {
                display: none !important;
            }

            #menu {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
                font-family: system-ui, -apple-system, sans-serif;
                color: #f8fafc;
            }

            #menu.hidden {
                display: none;
            }

            .menu-card {
                width: 100%;
                max-width: 420px;
            }

            .menu-card h1 {
                margin: 0 0 8px;
                font-size: 1.5rem;
                font-weight: 700;
            }

            .menu-card p {
                margin: 0 0 24px;
                color: #94a3b8;
                line-height: 1.5;
            }

            .menu-options {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .menu-options button {
                width: 100%;
                padding: 14px 18px;
                border: 1px solid #334155;
                border-radius: 12px;
                background: #1e293b;
                color: #f8fafc;
                font-size: 1rem;
                text-align: left;
                cursor: pointer;
                transition: background 0.2s, border-color 0.2s;
            }

            .menu-options button:hover,
            .menu-options button:focus {
                background: #334155;
                border-color: #64748b;
                outline: none;
            }

            .menu-options button span {
                display: block;
                margin-top: 4px;
                font-size: 0.85rem;
                color: #94a3b8;
            }

            #ar-controls {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 9998;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 28px calc(24px + env(safe-area-inset-bottom));
                background: transparent;
                font-family: system-ui, -apple-system, sans-serif;
                pointer-events: none;
            }

            #ar-controls.hidden {
                display: none;
            }

            #ar-controls .controls-side {
                width: 72px;
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: auto;
            }

            #ar-controls .controls-center {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: auto;
            }

            #btn-change-model {
                width: 52px;
                height: 52px;
                padding: 0;
                border: none;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.18);
                color: #fff;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(6px);
                transition: background 0.2s, transform 0.15s;
            }

            #btn-change-model:active {
                transform: scale(0.94);
                background: rgba(255, 255, 255, 0.28);
            }

            #btn-change-model svg {
                width: 26px;
                height: 26px;
            }

            #btn-capture-photo {
                width: 76px;
                height: 76px;
                padding: 0;
                border: 4px solid #fff;
                border-radius: 50%;
                background: transparent;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.15s;
            }

            #btn-capture-photo:active {
                transform: scale(0.92);
            }

            #btn-capture-photo .shutter-inner {
                width: 62px;
                height: 62px;
                border-radius: 50%;
                background: #fff;
                transition: transform 0.15s, background 0.15s;
            }

            #btn-capture-photo:active .shutter-inner {
                transform: scale(0.88);
                background: #e2e8f0;
            }

            #btn-open-gallery {
                width: 52px;
                height: 52px;
                padding: 0;
                border: 2px solid #fff;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.12);
                cursor: pointer;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.15s;
            }

            #btn-open-gallery:active {
                transform: scale(0.94);
            }

            #btn-open-gallery .gallery-thumb {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            #btn-open-gallery .gallery-icon {
                width: 26px;
                height: 26px;
                color: #fff;
            }

            #gallery {
                position: fixed;
                inset: 0;
                z-index: 10000;
                display: flex;
                flex-direction: column;
                background: #0f172a;
                color: #f8fafc;
                font-family: system-ui, -apple-system, sans-serif;
            }

            #gallery.hidden {
                display: none;
            }

            .gallery-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 20px calc(12px + env(safe-area-inset-top));
                border-bottom: 1px solid #1e293b;
            }

            .gallery-header h2 {
                margin: 0;
                font-size: 1.1rem;
            }

            .gallery-header button {
                border: none;
                background: transparent;
                color: #94a3b8;
                font-size: 1.6rem;
                cursor: pointer;
                padding: 4px 8px;
            }

            .gallery-grid {
                flex: 1;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                padding: 16px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                align-content: start;
            }

            @media (min-width: 640px) {
                .gallery-grid {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }
            }

            .gallery-grid:empty::before {
                content: 'Nenhuma foto ainda. Use o obturador para capturar seu story AR.';
                display: block;
                grid-column: 1 / -1;
                color: #94a3b8;
                font-size: 0.95rem;
                line-height: 1.5;
                padding: 12px 4px;
            }

            .gallery-card {
                border: none;
                padding: 0;
                background: #1e293b;
                border-radius: 12px;
                overflow: hidden;
                cursor: pointer;
                text-align: left;
            }

            .gallery-card-image {
                width: 100%;
                aspect-ratio: 3 / 4;
                background: #020617;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .gallery-card-image img {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }

            .gallery-card time {
                display: block;
                padding: 8px 10px;
                font-size: 0.75rem;
                color: #94a3b8;
            }

            .gallery-actions {
                margin-top: auto;
                padding: 16px 20px calc(20px + env(safe-area-inset-bottom));
                display: flex;
                gap: 12px;
            }

            .gallery-actions button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 10px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
            }

            #btn-clear-gallery {
                background: #334155;
                color: #f8fafc;
            }

            #photo-viewer {
                position: fixed;
                inset: 0;
                z-index: 10001;
                display: flex;
                flex-direction: column;
                background: rgba(0, 0, 0, 0.95);
            }

            #photo-viewer.hidden {
                display: none;
            }

            .viewer-header {
                display: flex;
                justify-content: space-between;
                padding: 16px 20px calc(12px + env(safe-area-inset-top));
            }

            .viewer-header button {
                border: none;
                background: transparent;
                color: #fff;
                font-size: 1rem;
                cursor: pointer;
            }

            #viewer-image {
                flex: 1;
                width: 100%;
                object-fit: contain;
            }
        </style>
        <script>
            AFRAME.registerComponent('heart-mesh', {
                init: function () {
                    const THREE = AFRAME.THREE;
                    const { vertices, trianglesIndexes } = useCoordinates(THREE);
                    const heartMesh = createHeartMesh(THREE, vertices, trianglesIndexes);

                    heartMesh.geometry.center();
                    heartMesh.geometry.computeBoundingBox();

                    const box = heartMesh.geometry.boundingBox;
                    const meshWidth = box.max.x - box.min.x;
                    const meshHeight = box.max.y - box.min.y;
                    const markerSize = 1;
                    const sizeMultiplier = 3;
                    const fitScale = (markerSize / Math.max(meshWidth, meshHeight)) * sizeMultiplier;

                    heartMesh.scale.set(fitScale, fitScale, fitScale);
                    this.el.setObject3D('mesh', heartMesh);
                }
            });

            function useCoordinates(THREE) {
                const vertices = [
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 5, -1.5),
                    new THREE.Vector3(5, 5, 0),
                    new THREE.Vector3(9, 9, 0),
                    new THREE.Vector3(5, 9, 2),
                    new THREE.Vector3(7, 13, 0),
                    new THREE.Vector3(3, 13, 0),
                    new THREE.Vector3(0, 11, 0),
                    new THREE.Vector3(5, 9, -2),
                    new THREE.Vector3(0, 8, -3),
                    new THREE.Vector3(0, 8, 3),
                    new THREE.Vector3(0, 5, 1.5),
                    new THREE.Vector3(-9, 9, 0),
                    new THREE.Vector3(-5, 5, 0),
                    new THREE.Vector3(-5, 9, -2),
                    new THREE.Vector3(-5, 9, 2),
                    new THREE.Vector3(-7, 13, 0),
                    new THREE.Vector3(-3, 13, 0)
                ];

                const trianglesIndexes = [
                    2, 11, 0, 2, 3, 4, 5, 4, 3, 4, 5, 6, 4, 6, 7, 4, 7, 10,
                    4, 10, 11, 4, 11, 2, 0, 11, 13, 12, 13, 15, 12, 15, 16,
                    16, 15, 17, 17, 15, 7, 7, 15, 10, 11, 10, 15, 13, 11, 15,
                    0, 1, 2, 1, 9, 2, 9, 8, 2, 5, 3, 8, 8, 3, 2, 6, 5, 8,
                    7, 6, 8, 9, 7, 8, 14, 17, 7, 14, 7, 9, 14, 9, 1, 9, 1, 13,
                    1, 0, 13, 14, 1, 13, 16, 14, 12, 16, 17, 14, 12, 14, 13
                ];

                return { vertices, trianglesIndexes };
            }

            function createHeartMesh(THREE, coordinatesList, trianglesIndexes) {
                const positions = [];
                const indices = [];
                let vertexIndex = 0;

                for (let i = 0; i < trianglesIndexes.length; i++) {
                    if ((i + 1) % 3 === 0) {
                        const points = [
                            coordinatesList[trianglesIndexes[i - 2]],
                            coordinatesList[trianglesIndexes[i - 1]],
                            coordinatesList[trianglesIndexes[i]]
                        ];

                        points.forEach(function (point) {
                            positions.push(point.x, point.y, point.z);
                        });

                        indices.push(vertexIndex, vertexIndex + 1, vertexIndex + 2);
                        vertexIndex += 3;
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshPhongMaterial({
                    color: 0xad0c00,
                    side: THREE.DoubleSide
                });

                return new THREE.Mesh(geometry, material);
            }

            var MODELS = ['padrao', 'coracao', 'escudo', 'suzane'];

            function hideAllModels() {
                MODELS.forEach(function (id) {
                    document.getElementById('model-' + id).setAttribute('visible', 'false');
                });
            }

            function startAR(modelId) {
                hideAllModels();
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('ar-controls').classList.remove('hidden');

                var scene = document.getElementById('ar-scene');
                if (!scene.getAttribute('arjs')) {
                    scene.setAttribute('arjs', 'sourceType: webcam;');
                }

                document.getElementById('model-' + modelId).setAttribute('visible', 'true');
            }

            function showMenu() {
                hideAllModels();
                document.getElementById('menu').classList.remove('hidden');
                document.getElementById('ar-controls').classList.add('hidden');
            }

            var GALLERY_DB = 'modelagem2026-gallery';
            var GALLERY_STORE = 'photos';
            var galleryPhotos = [];

            function openGalleryDB() {
                return new Promise(function (resolve, reject) {
                    var request = indexedDB.open(GALLERY_DB, 1);

                    request.onupgradeneeded = function (event) {
                        var db = event.target.result;

                        if (!db.objectStoreNames.contains(GALLERY_STORE)) {
                            db.createObjectStore(GALLERY_STORE, { keyPath: 'id' });
                        }
                    };

                    request.onsuccess = function () {
                        resolve(request.result);
                    };

                    request.onerror = function () {
                        reject(request.error);
                    };
                });
            }

            function loadGalleryPhotos() {
                return openGalleryDB().then(function (db) {
                    return new Promise(function (resolve, reject) {
                        var request = db.transaction(GALLERY_STORE, 'readonly')
                            .objectStore(GALLERY_STORE)
                            .getAll();

                        request.onsuccess = function () {
                            galleryPhotos = request.result.sort(function (a, b) {
                                return b.createdAt - a.createdAt;
                            });
                            resolve(galleryPhotos);
                        };

                        request.onerror = function () {
                            reject(request.error);
                        };
                    });
                });
            }

            function savePhotoToGallery(dataUrl) {
                var photo = {
                    id: Date.now(),
                    dataUrl: dataUrl,
                    createdAt: Date.now()
                };

                return openGalleryDB().then(function (db) {
                    return new Promise(function (resolve, reject) {
                        var transaction = db.transaction(GALLERY_STORE, 'readwrite');
                        transaction.objectStore(GALLERY_STORE).add(photo);
                        transaction.oncomplete = function () {
                            galleryPhotos.unshift(photo);
                            updateGalleryThumb();
                            resolve(photo);
                        };
                        transaction.onerror = function () {
                            reject(transaction.error);
                        };
                    });
                });
            }

            function deletePhotoFromGallery(photoId) {
                return openGalleryDB().then(function (db) {
                    return new Promise(function (resolve, reject) {
                        var transaction = db.transaction(GALLERY_STORE, 'readwrite');
                        transaction.objectStore(GALLERY_STORE).delete(photoId);
                        transaction.oncomplete = function () {
                            galleryPhotos = galleryPhotos.filter(function (photo) {
                                return photo.id !== photoId;
                            });
                            updateGalleryThumb();
                            renderGallery();
                            resolve();
                        };
                        transaction.onerror = function () {
                            reject(transaction.error);
                        };
                    });
                });
            }

            function clearGallery() {
                if (!galleryPhotos.length || !confirm('Apagar todas as fotos da galeria?')) {
                    return;
                }

                openGalleryDB().then(function (db) {
                    var transaction = db.transaction(GALLERY_STORE, 'readwrite');
                    transaction.objectStore(GALLERY_STORE).clear();
                    transaction.oncomplete = function () {
                        galleryPhotos = [];
                        updateGalleryThumb();
                        renderGallery();
                    };
                });
            }

            function updateGalleryThumb() {
                var thumb = document.getElementById('gallery-thumb');
                var icon = document.getElementById('gallery-icon');

                if (!galleryPhotos.length) {
                    thumb.classList.add('hidden');
                    icon.classList.remove('hidden');
                    thumb.removeAttribute('src');
                    return;
                }

                thumb.src = galleryPhotos[0].dataUrl;
                thumb.classList.remove('hidden');
                icon.classList.add('hidden');
            }

            function formatStoryDate(timestamp) {
                return new Date(timestamp).toLocaleString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            function renderGallery() {
                var container = document.getElementById('gallery-grid');
                container.innerHTML = '';

                galleryPhotos.forEach(function (photo) {
                    var item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'gallery-card';
                    item.innerHTML =
                        '<div class="gallery-card-image"><img src="' + photo.dataUrl + '" alt="Foto AR"></div>' +
                        '<time>' + formatStoryDate(photo.createdAt) + '</time>';
                    item.addEventListener('click', function () {
                        openPhotoViewer(photo.id);
                    });
                    container.appendChild(item);
                });
            }

            function openGallery() {
                loadGalleryPhotos().then(function () {
                    renderGallery();
                    document.getElementById('gallery').classList.remove('hidden');
                });
            }

            function closeGallery() {
                document.getElementById('gallery').classList.add('hidden');
            }

            function openPhotoViewer(photoId) {
                var photo = galleryPhotos.find(function (item) {
                    return item.id === photoId;
                });

                if (!photo) {
                    return;
                }

                document.getElementById('viewer-image').src = photo.dataUrl;
                document.getElementById('photo-viewer').dataset.photoId = String(photo.id);
                document.getElementById('photo-viewer').classList.remove('hidden');
            }

            function closePhotoViewer() {
                document.getElementById('photo-viewer').classList.add('hidden');
                document.getElementById('viewer-image').removeAttribute('src');
            }

            function deleteCurrentPhoto() {
                var viewer = document.getElementById('photo-viewer');
                var photoId = Number(viewer.dataset.photoId);

                if (!photoId) {
                    return;
                }

                deletePhotoFromGallery(photoId).then(function () {
                    closePhotoViewer();
                });
            }

            function downloadCurrentPhoto() {
                var image = document.getElementById('viewer-image');

                if (!image.src) {
                    return;
                }

                var link = document.createElement('a');
                link.download = 'modelagem2026-' + Date.now() + '.png';
                link.href = image.src;
                link.click();
            }

            function composePhotoCanvas(callback) {
                var scene = document.getElementById('ar-scene');
                var video = document.querySelector('video');
                var arCanvas = scene.canvas;

                if (!video || !arCanvas || video.readyState < 2) {
                    alert('Aguarde a câmera carregar antes de capturar.');
                    return;
                }

                requestAnimationFrame(function () {
                    var output = document.createElement('canvas');
                    var viewWidth = window.innerWidth;
                    var viewHeight = window.innerHeight;
                    var ctx = output.getContext('2d');
                    var videoWidth = video.videoWidth;
                    var videoHeight = video.videoHeight;
                    var videoRatio = videoWidth / videoHeight;
                    var viewRatio = viewWidth / viewHeight;
                    var sourceX;
                    var sourceY;
                    var sourceWidth;
                    var sourceHeight;

                    output.width = viewWidth;
                    output.height = viewHeight;

                    if (videoRatio > viewRatio) {
                        sourceHeight = videoHeight;
                        sourceWidth = videoHeight * viewRatio;
                        sourceX = (videoWidth - sourceWidth) / 2;
                        sourceY = 0;
                    } else {
                        sourceWidth = videoWidth;
                        sourceHeight = videoWidth / viewRatio;
                        sourceX = 0;
                        sourceY = (videoHeight - sourceHeight) / 2;
                    }

                    ctx.drawImage(
                        video,
                        sourceX, sourceY, sourceWidth, sourceHeight,
                        0, 0, viewWidth, viewHeight
                    );
                    ctx.drawImage(arCanvas, 0, 0, viewWidth, viewHeight);
                    callback(output.toDataURL('image/png'));
                });
            }

            function capturePhoto() {
                composePhotoCanvas(function (dataUrl) {
                    savePhotoToGallery(dataUrl).catch(function () {
                        alert('Não foi possível salvar a foto na galeria deste dispositivo.');
                    });

                    var link = document.createElement('a');
                    link.download = 'modelagem2026-' + Date.now() + '.png';
                    link.href = dataUrl;
                    link.click();
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                loadGalleryPhotos().then(updateGalleryThumb).catch(function () {
                    updateGalleryThumb();
                });
            });
        </script>
    </head>
    <body style="margin: 0; overflow: hidden;">
        <div id="menu">
            <div class="menu-card">
                <h1>Modelagem Tridimensional 2026</h1>
                <p>Escolha o modelo que deseja ver em realidade aumentada. A câmera será aberta após a seleção.</p>
                <div class="menu-options">
                    <button type="button" data-model="padrao" onclick="startAR('padrao')">
                        Modelo padrão do framework
                        <span>Esfera vermelha e plano verde (exemplo AR.js)</span>
                    </button>
                    <button type="button" data-model="coracao" onclick="startAR('coracao')">
                        Coração 3D
                        <span>Malha customizada em Three.js</span>
                    </button>
                    <button type="button" data-model="escudo" onclick="startAR('escudo')">
                        Escudo do Vasco
                        <span>Imagem SVG sobre o marcador</span>
                    </button>
                    <button type="button" data-model="suzane" onclick="startAR('suzane')">
                        Suzane
                        <span>Modelo 3D em GLB</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="ar-controls" class="hidden">
            <div class="controls-side">
                <button id="btn-change-model" type="button" onclick="showMenu()" aria-label="Trocar modelo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
                    </svg>
                </button>
            </div>
            <div class="controls-center">
                <button id="btn-capture-photo" type="button" onclick="capturePhoto()" aria-label="Capturar foto">
                    <span class="shutter-inner"></span>
                </button>
            </div>
            <div class="controls-side">
                <button id="btn-open-gallery" type="button" onclick="openGallery()" aria-label="Abrir galeria">
                    <img id="gallery-thumb" class="gallery-thumb hidden" alt="Última foto">
                    <svg id="gallery-icon" class="gallery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <path d="M21 15l-5-5L5 21"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="gallery" class="hidden">
            <div class="gallery-header">
                <h2>Seu story AR</h2>
                <button type="button" onclick="closeGallery()" aria-label="Fechar galeria">×</button>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
            <div class="gallery-actions">
                <button id="btn-clear-gallery" type="button" onclick="clearGallery()">Limpar galeria</button>
            </div>
        </div>

        <div id="photo-viewer" class="hidden">
            <div class="viewer-header">
                <button type="button" onclick="closePhotoViewer()">Fechar</button>
                <button type="button" onclick="downloadCurrentPhoto()">Baixar</button>
                <button type="button" onclick="deleteCurrentPhoto()">Apagar</button>
            </div>
            <img id="viewer-image" alt="Foto em tela cheia">
        </div>

        <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" renderer="preserveDrawingBuffer: true">
            <a-assets>
                <a-asset-item id="suzane" src="suzane.glb"></a-asset-item>
                <img id="escudo" src="escudo-vasco.svg">
            </a-assets>
            <a-marker type="pattern" url="tenta-esse.patt" size="1">
                <a-entity id="model-padrao" visible="false">
                    <a-sphere position="0 0.5 0" radius="0.5" color="#EF2D5E"></a-sphere>
                    <a-plane position="0 0 0" rotation="-90 0 0" width="1" height="1" color="#7BC8A4"></a-plane>
                </a-entity>
                <a-entity id="model-coracao" heart-mesh visible="false" position="0 0 0"></a-entity>
                <a-entity id="model-escudo" visible="false">
                    <a-image
                        src="#escudo"
                        position="0 0.5 0"
                        rotation="-90 0 0"
