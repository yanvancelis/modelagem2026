<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modelagem Tridimensional 2026</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
        <style>
            #menu {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
                font-family: system-ui, -apple-system, sans-serif;
                color: #f8fafc;
            }

            #menu.hidden {
                display: none;
            }

            .menu-card {
                width: 100%;
                max-width: 420px;
            }

            .menu-card h1 {
                margin: 0 0 8px;
                font-size: 1.5rem;
                font-weight: 700;
            }

            .menu-card p {
                margin: 0 0 24px;
                color: #94a3b8;
                line-height: 1.5;
            }

            .menu-options {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .menu-options button {
                width: 100%;
                padding: 14px 18px;
                border: 1px solid #334155;
                border-radius: 12px;
                background: #1e293b;
                color: #f8fafc;
                font-size: 1rem;
                text-align: left;
                cursor: pointer;
                transition: background 0.2s, border-color 0.2s;
            }

            .menu-options button:hover,
            .menu-options button:focus {
                background: #334155;
                border-color: #64748b;
                outline: none;
            }

            .menu-options button span {
                display: block;
                margin-top: 4px;
                font-size: 0.85rem;
                color: #94a3b8;
            }

            #ar-controls {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 9998;
                display: flex;
                gap: 12px;
                padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
                background: rgba(15, 23, 42, 0.92);
                backdrop-filter: blur(8px);
                font-family: system-ui, -apple-system, sans-serif;
            }

            #ar-controls.hidden {
                display: none;
            }

            #ar-controls button {
                flex: 1;
                padding: 14px 16px;
                border: none;
                border-radius: 12px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
            }

            #btn-change-model {
                background: #334155;
                color: #f8fafc;
            }

            #btn-capture-photo {
                background: #dc2626;
                color: #fff;
            }
        </style>
        <script>
            AFRAME.registerComponent('heart-mesh', {
                init: function () {
                    const THREE = AFRAME.THREE;
                    const { vertices, trianglesIndexes } = useCoordinates(THREE);
                    const heartMesh = createHeartMesh(THREE, vertices, trianglesIndexes);

                    heartMesh.geometry.center();
                    heartMesh.geometry.computeBoundingBox();

                    const box = heartMesh.geometry.boundingBox;
                    const meshWidth = box.max.x - box.min.x;
                    const meshHeight = box.max.y - box.min.y;
                    const markerSize = 1;
                    const sizeMultiplier = 3;
                    const fitScale = (markerSize / Math.max(meshWidth, meshHeight)) * sizeMultiplier;

                    heartMesh.scale.set(fitScale, fitScale, fitScale);
                    this.el.setObject3D('mesh', heartMesh);
                }
            });

            function useCoordinates(THREE) {
                const vertices = [
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 5, -1.5),
                    new THREE.Vector3(5, 5, 0),
                    new THREE.Vector3(9, 9, 0),
                    new THREE.Vector3(5, 9, 2),
                    new THREE.Vector3(7, 13, 0),
                    new THREE.Vector3(3, 13, 0),
                    new THREE.Vector3(0, 11, 0),
                    new THREE.Vector3(5, 9, -2),
                    new THREE.Vector3(0, 8, -3),
                    new THREE.Vector3(0, 8, 3),
                    new THREE.Vector3(0, 5, 1.5),
                    new THREE.Vector3(-9, 9, 0),
                    new THREE.Vector3(-5, 5, 0),
                    new THREE.Vector3(-5, 9, -2),
                    new THREE.Vector3(-5, 9, 2),
                    new THREE.Vector3(-7, 13, 0),
                    new THREE.Vector3(-3, 13, 0)
                ];

                const trianglesIndexes = [
                    2, 11, 0, 2, 3, 4, 5, 4, 3, 4, 5, 6, 4, 6, 7, 4, 7, 10,
                    4, 10, 11, 4, 11, 2, 0, 11, 13, 12, 13, 15, 12, 15, 16,
                    16, 15, 17, 17, 15, 7, 7, 15, 10, 11, 10, 15, 13, 11, 15,
                    0, 1, 2, 1, 9, 2, 9, 8, 2, 5, 3, 8, 8, 3, 2, 6, 5, 8,
                    7, 6, 8, 9, 7, 8, 14, 17, 7, 14, 7, 9, 14, 9, 1, 9, 1, 13,
                    1, 0, 13, 14, 1, 13, 16, 14, 12, 16, 17, 14, 12, 14, 13
                ];

                return { vertices, trianglesIndexes };
            }

            function createHeartMesh(THREE, coordinatesList, trianglesIndexes) {
                const positions = [];
                const indices = [];
                let vertexIndex = 0;

                for (let i = 0; i < trianglesIndexes.length; i++) {
                    if ((i + 1) % 3 === 0) {
                        const points = [
                            coordinatesList[trianglesIndexes[i - 2]],
                            coordinatesList[trianglesIndexes[i - 1]],
                            coordinatesList[trianglesIndexes[i]]
                        ];

                        points.forEach(function (point) {
                            positions.push(point.x, point.y, point.z);
                        });

                        indices.push(vertexIndex, vertexIndex + 1, vertexIndex + 2);
                        vertexIndex += 3;
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshPhongMaterial({
                    color: 0xad0c00,
                    side: THREE.DoubleSide
                });

                return new THREE.Mesh(geometry, material);
            }

            var MODELS = ['padrao', 'coracao', 'escudo', 'suzane'];

            function hideAllModels() {
                MODELS.forEach(function (id) {
                    document.getElementById('model-' + id).setAttribute('visible', 'false');
                });
            }

            function startAR(modelId) {
                hideAllModels();
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('ar-controls').classList.remove('hidden');

                var scene = document.getElementById('ar-scene');
                if (!scene.getAttribute('arjs')) {
                    scene.setAttribute('arjs', 'sourceType: webcam;');
                }

                document.getElementById('model-' + modelId).setAttribute('visible', 'true');
            }

            function showMenu() {
                hideAllModels();
                document.getElementById('menu').classList.remove('hidden');
                document.getElementById('ar-controls').classList.add('hidden');
            }

            function capturePhoto() {
                var scene = document.getElementById('ar-scene');
                var canvas = scene.canvas;

                if (!canvas) {
                    return;
                }

                requestAnimationFrame(function () {
                    var link = document.createElement('a');
                    link.download = 'modelagem2026-' + Date.now() + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            }
        </script>
    </head>
    <body style="margin: 0; overflow: hidden;">
        <div id="menu">
            <div class="menu-card">
                <h1>Modelagem Tridimensional 2026</h1>
                <p>Escolha o modelo que deseja ver em realidade aumentada. A câmera será aberta após a seleção.</p>
                <div class="menu-options">
                    <button type="button" data-model="padrao" onclick="startAR('padrao')">
                        Modelo padrão do framework
                        <span>Esfera vermelha e plano verde (exemplo AR.js)</span>
                    </button>
                    <button type="button" data-model="coracao" onclick="startAR('coracao')">
                        Coração 3D
                        <span>Malha customizada em Three.js</span>
                    </button>
                    <button type="button" data-model="escudo" onclick="startAR('escudo')">
                        Escudo do Vasco
                        <span>Imagem SVG sobre o marcador</span>
                    </button>
                    <button type="button" data-model="suzane" onclick="startAR('suzane')">
                        Suzane
                        <span>Modelo 3D em GLB</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="ar-controls" class="hidden">
            <button id="btn-change-model" type="button" onclick="showMenu()">Escolher outro</button>
            <button id="btn-capture-photo" type="button" onclick="capturePhoto()">Capturar foto</button>
        </div>

        <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" renderer="preserveDrawingBuffer: true">
            <a-assets>
                <a-asset-item id="suzane" src="suzane.glb"></a-asset-item>
                <img id="escudo" src="escudo-vasco.svg">
            </a-assets>
            <a-marker preset="hiro" size="1">
                <a-entity id="model-padrao" visible="false">
                    <a-sphere position="0 0.5 0" radius="0.5" color="#EF2D5E"></a-sphere>
                    <a-plane position="0 0 0" rotation="-90 0 0" width="1" height="1" color="#7BC8A4"></a-plane>
                </a-entity>
                <a-entity id="model-coracao" heart-mesh visible="false" position="0 0 0"></a-entity>
                <a-entity id="model-escudo" visible="false">
                    <a-image
                        src="#escudo"
                        position="0 0.5 0"
                        rotation="-90 0 0"
                        width="3"
                        height="3.79"
                        material="transparent: true; alphaTest: 0.01; shader: flat">
                    </a-image>
                </a-entity>
                <a-entity
                    id="model-suzane"
                    visible="false"
                    gltf-model="#suzane"
                    position="0 1.48 0"
                    rotation="0 0 0"
                    scale="1.5 1.5 1.5">
                </a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
